bug:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*bug*'
          - '**/*fix*'

enhancement:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*feat*'
          - '**/*feature*'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - '**/docs/**'

area-frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**'
          - 'frontend/**'

area-backend:
  - changed-files:
      - any-glob-to-any-file:
          - 'server/**'
          - 'internbackend/**'

area-database:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.prisma'
          - '**/migrations/**'

area-auth:
  - changed-files:
      - any-glob-to-any-file:
          - '**/auth/**'
          - '**/auth*'
          - '**/middleware/auth*'

area-realtime:
  - changed-files:
      - any-glob-to-any-file:
          - '**/socket*'
          - '**/realtime*'

area-security:
  - changed-files:
      - any-glob-to-any-file:
          - '**/security*'
          - '**/csrf*'
          - '**/middleware/**'

area-performance:
  - changed-files:
      - any-glob-to-any-file:
          - '**/cache*'
          - '**/redis*'
          - '**/lru*'

area-devops:
  - changed-files:
      - any-glob-to-any-file:
          - '**/.github/**'
          - '**/Dockerfile*'
          - '**/docker-compose*'
          - '**/*.yml'

type-test:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.*'
          - '**/*.spec.*'
          - '**/tests/**'
          - '**/__tests__/**'
